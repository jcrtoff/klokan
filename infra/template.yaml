AWSTemplateFormatVersion: "2010-09-09"
Description: Klokan infrastructure — ECR

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - prd
    Description: Deployment environment (dev or prd)

Resources:
  # ── ECR Repository ────────────────────────────────────────
  Repository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "klokan-${Environment}"
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

Outputs:
  EcrRepositoryUri:
    Description: ECR repository URI
    Value: !GetAtt Repository.RepositoryUri
