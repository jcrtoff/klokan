<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Klokan</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/i18n.js"></script>
  <style>
    .admin-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .admin-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .admin-header h1 { font-size: 22px; font-weight: 700; }
    .admin-section { margin-bottom: 40px; }
    .admin-section h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .admin-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .admin-tab {
      flex: 1;
      padding: 10px 0;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .admin-tab.active {
      color: var(--cta-600);
      border-bottom-color: var(--cta-600);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      font-size: 14px;
    }
    .admin-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .admin-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table .muted { color: var(--text-secondary); font-size: 13px; }
    .admin-table .revoke-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 4px 10px;
      font-size: 12px;
      color: var(--red-text);
      cursor: pointer;
    }
    .admin-table .revoke-btn:hover { background: var(--red-bg); }
    .admin-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .admin-form .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
    .admin-form label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .admin-form input {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      background: var(--bg);
    }
    .admin-form input:focus { border-color: var(--cta-600); outline: none; }
    .admin-form button {
      padding: 9px 18px;
      background: var(--cta-600);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .admin-form button:hover { background: var(--cta-800); }
    .admin-form button:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-error { font-size: 13px; color: var(--red-text); margin-top: 8px; }
    .badge-authorized {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
      background: var(--teal-50);
      color: var(--teal-800);
    }
    .badge-revoked {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
      background: var(--red-bg);
      color: var(--red-text);
    }
    .empty-row td { color: var(--text-secondary); font-style: italic; }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>Klokan — Admin</h1>
      <div style="display: flex; align-items: center; gap: 16px;">
        <div id="langToggle" class="lang-toggle">
          <button data-lang="fr" class="lang-btn lang-active" onclick="switchLang('fr')">FR</button>
          <span class="lang-sep">|</span>
          <button data-lang="en" class="lang-btn" onclick="switchLang('en')">EN</button>
        </div>
        <button id="logoutBtn" class="link-btn" data-i18n="logout">Déconnexion</button>
      </div>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="managers" data-i18n="managers">Gestionnaires</button>
      <button class="admin-tab" data-tab="brokers" data-i18n="solo_brokers">Courtiers solo</button>
    </div>

    <div id="managersPanel">
    <div class="admin-section">
      <h2 data-i18n="add_manager">Ajouter un gestionnaire</h2>
      <form class="admin-form" id="addManagerForm" autocomplete="off">
        <div class="field">
          <label for="mgEmail" data-i18n="email_label">Courriel</label>
          <input type="email" id="mgEmail" placeholder="gestionnaire@example.com" data-i18n="mgr_email_placeholder" data-i18n-target="placeholder" required>
        </div>
        <div class="field">
          <label for="mgName" data-i18n="name_label">Nom</label>
          <input type="text" id="mgName" placeholder="Prénom Nom" data-i18n="mgr_name_placeholder" data-i18n-target="placeholder" required>
        </div>
        <button type="submit" id="addBtn" data-i18n="add_btn">Ajouter</button>
      </form>
      <div class="form-error hidden" id="formError"></div>
    </div>

    <div class="admin-section">
      <table class="admin-table" id="managersTable">
        <thead>
          <tr>
            <th data-i18n="name_label">Nom</th>
            <th data-i18n="email_label">Courriel</th>
            <th data-i18n="status">Statut</th>
            <th data-i18n="last_login">Dernière connexion</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="managersBody">
          <tr class="empty-row"><td colspan="5" data-i18n="loading">Chargement…</td></tr>
        </tbody>
      </table>
    </div>
    </div>

    <div id="brokersPanel" class="hidden">
    <div class="admin-section">
      <h2 data-i18n="add_solo_broker">Ajouter un courtier solo</h2>
      <form class="admin-form" id="addBrokerForm" autocomplete="off">
        <div class="field">
          <label for="brEmail" data-i18n="email_label">Courriel</label>
          <input type="email" id="brEmail" placeholder="courtier@example.com" data-i18n="broker_email_placeholder" data-i18n-target="placeholder" required>
        </div>
        <div class="field">
          <label for="brName" data-i18n="name_label">Nom</label>
          <input type="text" id="brName" placeholder="Prénom Nom" data-i18n="broker_name_placeholder" data-i18n-target="placeholder" required>
        </div>
        <button type="submit" id="addBrokerBtn" data-i18n="add_btn">Ajouter</button>
      </form>
      <div class="form-error hidden" id="brokerFormError"></div>
    </div>

    <div class="admin-section">
      <table class="admin-table" id="brokersTable">
        <thead>
          <tr>
            <th data-i18n="name_label">Nom</th>
            <th data-i18n="email_label">Courriel</th>
            <th data-i18n="status">Statut</th>
            <th data-i18n="last_login">Dernière connexion</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="brokersBody">
          <tr class="empty-row"><td colspan="5" data-i18n="loading">Chargement…</td></tr>
        </tbody>
      </table>
    </div>
    </div>
  </div>

  <script>
    i18n.init();

    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const which = tab.dataset.tab;
        document.getElementById('managersPanel').classList.toggle('hidden', which !== 'managers');
        document.getElementById('brokersPanel').classList.toggle('hidden', which !== 'brokers');
      });
    });

    function switchLang(lang) {
      i18n.setLang(lang);
      const t = localStorage.getItem('klokan_token');
      if (t) {
        fetch('/api/auth/settings', {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ language: lang })
        }).catch(() => {});
      }
    }

    const token = localStorage.getItem('klokan_token');
    if (!token) { window.location.href = '/broker/login'; }

    // Verify token and role
    (async () => {
      try {
        const resp = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!resp.ok) throw new Error();
        const broker = await resp.json();
        if (broker.role !== 'admin') {
          window.location.href = '/broker';
          return;
        }
        if (broker.language) {
          i18n.setLang(broker.language);
        }
      } catch {
        localStorage.removeItem('klokan_token');
        localStorage.removeItem('klokan_broker');
        window.location.href = '/broker/login';
        return;
      }
      loadManagers();
      loadBrokers();
    })();

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('klokan_token');
      localStorage.removeItem('klokan_broker');
      window.location.href = '/broker/login';
    });

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('fr-CA', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadManagers() {
      try {
        const resp = await fetch('/api/admin/managers', { headers: { 'Authorization': `Bearer ${token}` } });
        const managers = await resp.json();
        renderManagers(managers);
      } catch {
        document.getElementById('managersBody').innerHTML =
          `<tr class="empty-row"><td colspan="5">${i18n.t('load_error')}</td></tr>`;
      }
    }

    function renderManagers(managers) {
      const tbody = document.getElementById('managersBody');
      if (managers.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5">${i18n.t('no_managers')}</td></tr>`;
        return;
      }
      tbody.innerHTML = managers.map(m => `
        <tr data-id="${m.id}">
          <td>${escapeHtml(m.name)}</td>
          <td class="muted">${escapeHtml(m.email)}</td>
          <td>${m.authorized ? `<span class="badge-authorized">${i18n.t('active')}</span>` : `<span class="badge-revoked">${i18n.t('revoked')}</span>`}</td>
          <td class="muted">${formatDate(m.lastLogin)}</td>
          <td>${m.authorized ? `<button class="revoke-btn" data-id="${m.id}">${i18n.t('revoke')}</button>` : ''}</td>
        </tr>
      `).join('');

      tbody.querySelectorAll('.revoke-btn').forEach(btn => {
        btn.addEventListener('click', () => revokeManager(btn.dataset.id));
      });
    }

    async function revokeManager(id) {
      if (!confirm(i18n.t('revoke_manager_confirm'))) return;
      try {
        await fetch(`/api/admin/managers/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        loadManagers();
      } catch {
        alert(i18n.t('revoke_error'));
      }
    }

    async function loadBrokers() {
      try {
        const resp = await fetch('/api/admin/brokers', { headers: { 'Authorization': `Bearer ${token}` } });
        const brokers = await resp.json();
        renderBrokers(brokers);
      } catch {
        document.getElementById('brokersBody').innerHTML =
          `<tr class="empty-row"><td colspan="5">${i18n.t('load_error')}</td></tr>`;
      }
    }

    function renderBrokers(brokers) {
      const tbody = document.getElementById('brokersBody');
      if (brokers.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5">${i18n.t('no_solo_brokers')}</td></tr>`;
        return;
      }
      tbody.innerHTML = brokers.map(b => `
        <tr data-id="${b.id}">
          <td>${escapeHtml(b.name)}</td>
          <td class="muted">${escapeHtml(b.email)}</td>
          <td>${b.authorized ? `<span class="badge-authorized">${i18n.t('active')}</span>` : `<span class="badge-revoked">${i18n.t('revoked')}</span>`}</td>
          <td class="muted">${formatDate(b.lastLogin)}</td>
          <td>${b.authorized ? `<button class="revoke-btn" data-id="${b.id}">${i18n.t('revoke')}</button>` : ''}</td>
        </tr>
      `).join('');

      tbody.querySelectorAll('.revoke-btn').forEach(btn => {
        btn.addEventListener('click', () => revokeBroker(btn.dataset.id));
      });
    }

    async function revokeBroker(id) {
      if (!confirm(i18n.t('revoke_broker_confirm'))) return;
      try {
        await fetch(`/api/admin/brokers/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        loadBrokers();
      } catch {
        alert(i18n.t('revoke_error'));
      }
    }

    document.getElementById('addBrokerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('brokerFormError');
      errorEl.classList.add('hidden');
      const email = document.getElementById('brEmail').value.trim();
      const name = document.getElementById('brName').value.trim();
      const addBtn = document.getElementById('addBrokerBtn');
      addBtn.disabled = true;
      try {
        const resp = await fetch('/api/admin/brokers', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, name })
        });
        const data = await resp.json();
        if (!resp.ok) {
          errorEl.textContent = i18n.t(data.error) || i18n.t('connection_error');
          errorEl.classList.remove('hidden');
          return;
        }
        document.getElementById('brEmail').value = '';
        document.getElementById('brName').value = '';
        loadBrokers();
      } catch {
        errorEl.textContent = i18n.t('connection_error');
        errorEl.classList.remove('hidden');
      } finally {
        addBtn.disabled = false;
      }
    });

    document.getElementById('addManagerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('formError');
      errorEl.classList.add('hidden');
      const email = document.getElementById('mgEmail').value.trim();
      const name = document.getElementById('mgName').value.trim();
      const addBtn = document.getElementById('addBtn');
      addBtn.disabled = true;
      try {
        const resp = await fetch('/api/admin/managers', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, name })
        });
        const data = await resp.json();
        if (!resp.ok) {
          errorEl.textContent = i18n.t(data.error) || i18n.t('connection_error');
          errorEl.classList.remove('hidden');
          return;
        }
        document.getElementById('mgEmail').value = '';
        document.getElementById('mgName').value = '';
        loadManagers();
      } catch {
        errorEl.textContent = i18n.t('connection_error');
        errorEl.classList.remove('hidden');
      } finally {
        addBtn.disabled = false;
      }
    });

    fetch('/api/version').then(r => r.json()).then(d => {
      document.getElementById('versionTag').textContent = d.sha;
    }).catch(() => {});
  </script>
  <div class="version-tag" id="versionTag"></div>
</body>
</html>
