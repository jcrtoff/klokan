<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Roxanne — RodCast</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span class="online-dot"></span>
      <div>
        <h1>Roxanne</h1>
        <div class="subtitle" id="subtitle">Assistante · RodCast</div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
      </div>
      <div class="broker-typing-indicator" id="brokerTyping"></div>
    </div>

    <div class="input-bar">
      <input type="text" id="msgInput" placeholder="Écrire un message…" autocomplete="off">
      <button id="sendBtn">Envoyer</button>
    </div>
    <div class="version-tag" id="versionTag"></div>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const brokerTyping = document.getElementById('brokerTyping');
    const subtitleEl = document.getElementById('subtitle');

    let ws;
    let streamBubble = null;
    let sessionId = sessionStorage.getItem('rodcast_sessionId');

    // Check for pre-assigned broker
    const params = new URLSearchParams(location.search);
    const targetBrokerId = params.get('broker');

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => {
        const identify = { type: 'identify', role: 'chat' };
        if (sessionId) identify.sessionId = sessionId;
        if (targetBrokerId) identify.brokerId = targetBrokerId;
        ws.send(JSON.stringify(identify));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        switch (msg.type) {
          case 'session_assigned':
            sessionId = msg.sessionId;
            sessionStorage.setItem('rodcast_sessionId', sessionId);
            if (msg.brokerName) {
              subtitleEl.textContent = `Assistante de ${msg.brokerName} · RodCast`;
              brokerTyping.textContent = `${msg.brokerName} est en train d'écrire…`;
            } else {
              subtitleEl.textContent = 'Assistante · RodCast';
              brokerTyping.textContent = 'Le courtier est en train d\'écrire…';
            }
            break;

          case 'message':
            addBubble(msg.role, msg.content, msg.brokerName);
            break;

          case 'stream_token':
            if (!streamBubble) {
              typingIndicator.classList.remove('visible');
              streamBubble = createBubble('ai');
              messages.appendChild(streamBubble);
            }
            streamBubble.textContent += msg.content;
            scrollToBottom();
            break;

          case 'stream_done':
            streamBubble = null;
            break;

          case 'broker_typing':
            brokerTyping.classList.toggle('visible', msg.isTyping);
            scrollToBottom();
            break;
        }
      };

      ws.onclose = () => {
        setTimeout(connect, 2000);
      };
    }

    function createBubble(role) {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;
      return div;
    }

    function addBubble(role, content, brokerName) {
      const div = createBubble(role);
      if (role === 'broker' && brokerName) {
        const label = document.createElement('div');
        label.className = 'broker-label';
        label.textContent = brokerName;
        div.appendChild(label);
      }
      const text = document.createTextNode(content);
      div.appendChild(text);
      messages.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    function send() {
      const text = msgInput.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;

      ws.send(JSON.stringify({ type: 'user_message', content: text }));
      addBubble('user', text);
      msgInput.value = '';
      typingIndicator.classList.add('visible');
      scrollToBottom();
    }

    sendBtn.addEventListener('click', send);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });

    connect();

    fetch('/api/version').then(r => r.json()).then(d => {
      document.getElementById('versionTag').textContent = d.sha;
    }).catch(() => {});
  </script>
</body>
</html>
