<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI — Klokan</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/i18n.js"></script>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span class="online-dot"></span>
      <div>
        <h1>AI</h1>
        <div class="subtitle" id="subtitle">Assistante · <span class="brand-klokan">Klokan</span></div>
      </div>
      <div id="langToggle" class="lang-toggle" style="margin-left: auto;">
        <button data-lang="fr" class="lang-btn lang-active" onclick="switchLang('fr')">FR</button>
        <span class="lang-sep">|</span>
        <button data-lang="en" class="lang-btn" onclick="switchLang('en')">EN</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
      </div>
      <div class="broker-typing-indicator" id="brokerTyping"></div>
    </div>

    <div class="connection-banner visible" id="connectionBanner" data-i18n="connecting">Connexion en cours…</div>
    <div class="input-bar">
      <input type="text" id="msgInput" placeholder="Écrire un message…" data-i18n="write_message" data-i18n-target="placeholder" autocomplete="off">
      <button id="sendBtn" disabled data-i18n="send">Envoyer</button>
    </div>
    <div class="version-tag" id="versionTag"></div>
  </div>

  <script>
    i18n.init();

    const messages = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const brokerTyping = document.getElementById('brokerTyping');
    const subtitleEl = document.getElementById('subtitle');

    let ws;
    let streamBubble = null;
    let sessionId = sessionStorage.getItem('klokan_sessionId');
    let connectAttempts = 0;
    const MAX_RETRY_ATTEMPTS = 5;
    let currentBrokerName = null;

    const connectionBanner = document.getElementById('connectionBanner');

    function switchLang(lang) {
      i18n.setLang(lang);
      updateSubtitle(currentBrokerName);
    }

    function updateSubtitle(brokerName) {
      if (brokerName) {
        subtitleEl.textContent = `${i18n.t('subtitle_with_broker_prefix')} ${brokerName} · Klokan`;
      } else {
        subtitleEl.textContent = i18n.t('subtitle');
      }
    }

    // Check for pre-assigned broker
    const params = new URLSearchParams(location.search);
    const targetBrokerId = params.get('broker');

    function setConnected(connected) {
      sendBtn.disabled = !connected;
      connectionBanner.classList.toggle('visible', !connected);
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => {
        connectAttempts = 0;
        setConnected(true);
        const identify = { type: 'identify', role: 'chat' };
        if (sessionId) identify.sessionId = sessionId;
        if (targetBrokerId) identify.brokerId = targetBrokerId;
        ws.send(JSON.stringify(identify));
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        switch (msg.type) {
          case 'session_assigned':
            sessionId = msg.sessionId;
            sessionStorage.setItem('klokan_sessionId', sessionId);
            currentBrokerName = msg.brokerName || null;
            updateSubtitle(currentBrokerName);
            brokerTyping.textContent = currentBrokerName
              ? `${currentBrokerName} ${i18n.t('is_typing')}`
              : i18n.t('broker_typing');
            break;

          case 'message':
            addBubble(msg.role, msg.content, msg.brokerName);
            break;

          case 'stream_token':
            if (!streamBubble) {
              typingIndicator.classList.remove('visible');
              streamBubble = createBubble('ai');
              messages.appendChild(streamBubble);
            }
            streamBubble.textContent += msg.content;
            scrollToBottom();
            break;

          case 'stream_done':
            streamBubble = null;
            break;

          case 'broker_typing':
            brokerTyping.classList.toggle('visible', msg.isTyping);
            scrollToBottom();
            break;
        }
      };

      ws.onclose = () => {
        setConnected(false);
        connectAttempts++;
        if (connectAttempts >= MAX_RETRY_ATTEMPTS) {
          connectionBanner.textContent = i18n.t('max_retry');
          return;
        }
        connectionBanner.textContent = i18n.t('reconnecting');
        setTimeout(connect, 2000);
      };
    }

    function createBubble(role) {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;
      return div;
    }

    function addBubble(role, content, brokerName) {
      const div = createBubble(role);
      if (role === 'broker' && brokerName) {
        const label = document.createElement('div');
        label.className = 'broker-label';
        label.textContent = brokerName;
        div.appendChild(label);
      }
      const text = document.createTextNode(content);
      div.appendChild(text);
      messages.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    function send() {
      const text = msgInput.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;

      ws.send(JSON.stringify({ type: 'user_message', content: text }));
      addBubble('user', text);
      msgInput.value = '';
      typingIndicator.classList.add('visible');
      scrollToBottom();
    }

    sendBtn.addEventListener('click', send);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });

    connect();

    fetch('/api/version').then(r => r.json()).then(d => {
      document.getElementById('versionTag').textContent = d.sha;
    }).catch(() => {});
  </script>
</body>
</html>
