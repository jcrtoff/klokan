<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incidents — Klokan</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .admin-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .admin-header h1 { font-size: 22px; font-weight: 700; }
    .admin-section { margin-bottom: 40px; }
    .admin-section h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      font-size: 14px;
    }
    .admin-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .admin-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table .muted { color: var(--text-secondary); font-size: 13px; }
    .admin-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .field input, .field select, .field textarea {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--cta-600);
      outline: none;
    }
    .field textarea { resize: vertical; min-height: 60px; }
    .form-actions { display: flex; justify-content: flex-end; }
    .form-actions button {
      padding: 9px 18px;
      background: var(--cta-600);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .form-actions button:hover { background: var(--cta-800); }
    .form-actions button:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-error { font-size: 13px; color: var(--red-text); margin-top: 4px; }
    .risk-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .risk-low { background: var(--teal-50); color: var(--teal-800); }
    .risk-medium { background: #FFF3CD; color: #856404; }
    .risk-high { background: var(--red-bg); color: var(--red-text); }
    .empty-row td { color: var(--text-secondary); font-style: italic; }
    .back-link {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text-primary); }
    .desc-cell { max-width: 240px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>Registre des incidents</h1>
      <a href="/admin" class="back-link">&larr; Admin</a>
    </div>

    <div class="admin-section">
      <h2>Signaler un incident</h2>
      <form class="admin-form" id="incidentForm" autocomplete="off">
        <div class="form-row">
          <div class="field">
            <label for="occurredAt">Date de survenance</label>
            <input type="datetime-local" id="occurredAt" required>
          </div>
          <div class="field">
            <label for="discoveredAt">Date de découverte</label>
            <input type="datetime-local" id="discoveredAt" required>
          </div>
          <div class="field">
            <label for="riskLevel">Niveau de risque</label>
            <select id="riskLevel" required>
              <option value="low">Faible</option>
              <option value="medium">Moyen</option>
              <option value="high">Élevé</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Décrivez l'incident..." required></textarea>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="affectedSessions">Sessions affectées (IDs, séparés par des virgules)</label>
            <input type="text" id="affectedSessions" placeholder="uuid1, uuid2">
          </div>
          <div class="field">
            <label for="reportedToCAI">Signalé à la CAI ?</label>
            <select id="reportedToCAI">
              <option value="false">Non</option>
              <option value="true">Oui</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="actionsTaken">Actions prises</label>
          <textarea id="actionsTaken" placeholder="Mesures correctives..."></textarea>
        </div>
        <div class="form-error hidden" id="formError"></div>
        <div class="form-actions">
          <button type="submit" id="submitBtn">Enregistrer l'incident</button>
        </div>
      </form>
    </div>

    <div class="admin-section">
      <h2>Historique des incidents</h2>
      <table class="admin-table" id="incidentsTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Risque</th>
            <th>Description</th>
            <th>CAI</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="incidentsBody">
          <tr class="empty-row"><td colspan="5">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('klokan_token');
    if (!token) { window.location.href = '/broker/login'; }

    // Verify admin
    (async () => {
      try {
        const resp = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!resp.ok) throw new Error();
        const broker = await resp.json();
        if (broker.role !== 'admin') {
          window.location.href = '/broker';
          return;
        }
      } catch {
        localStorage.removeItem('klokan_token');
        window.location.href = '/broker/login';
        return;
      }
      loadIncidents();
    })();

    function formatDate(iso) {
      if (!iso) return '\u2014';
      return new Date(iso).toLocaleDateString('fr-CA', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function riskBadge(level) {
      const labels = { low: 'Faible', medium: 'Moyen', high: 'Élevé' };
      return `<span class="risk-badge risk-${level}">${labels[level] || level}</span>`;
    }

    async function loadIncidents() {
      try {
        const resp = await fetch('/api/admin/incidents', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const incidents = await resp.json();
        renderIncidents(incidents);
      } catch {
        document.getElementById('incidentsBody').innerHTML =
          '<tr class="empty-row"><td colspan="5">Erreur de chargement.</td></tr>';
      }
    }

    function renderIncidents(incidents) {
      const tbody = document.getElementById('incidentsBody');
      if (incidents.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Aucun incident enregistré.</td></tr>';
        return;
      }
      tbody.innerHTML = incidents.map(inc => `
        <tr>
          <td class="muted">${formatDate(inc.occurredAt)}</td>
          <td>${riskBadge(inc.riskLevel)}</td>
          <td class="desc-cell">${escapeHtml(inc.description)}</td>
          <td>${inc.reportedToCAI ? 'Oui' : 'Non'}</td>
          <td class="muted desc-cell">${escapeHtml(inc.actionsTaken) || '\u2014'}</td>
        </tr>
      `).join('');
    }

    document.getElementById('incidentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('formError');
      errorEl.classList.add('hidden');
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;

      const affectedRaw = document.getElementById('affectedSessions').value.trim();
      const affectedSessions = affectedRaw ? affectedRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

      const body = {
        occurredAt: document.getElementById('occurredAt').value,
        discoveredAt: document.getElementById('discoveredAt').value,
        riskLevel: document.getElementById('riskLevel').value,
        description: document.getElementById('description').value.trim(),
        affectedSessions,
        reportedToCAI: document.getElementById('reportedToCAI').value === 'true',
        actionsTaken: document.getElementById('actionsTaken').value.trim()
      };

      try {
        const resp = await fetch('/api/admin/incidents', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!resp.ok) {
          const data = await resp.json();
          errorEl.textContent = data.error || 'Erreur lors de la création.';
          errorEl.classList.remove('hidden');
          return;
        }
        // Reset form
        document.getElementById('incidentForm').reset();
        loadIncidents();
      } catch {
        errorEl.textContent = 'Erreur réseau.';
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
